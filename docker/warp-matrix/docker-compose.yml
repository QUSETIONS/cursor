# ═══════════════════════════════════════════════════════════════════
# Cloudflare WARP Proxy Matrix v2 — Using native WARP CLI
# Image: caomingjun/warp (more stable, uses official WARP client)
# Each container exposes SOCKS5 on a unique port (9001-9010)
# ═══════════════════════════════════════════════════════════════════

services:
  warp-node-1:
    image: caomingjun/warp:latest
    container_name: warp-node-1
    restart: unless-stopped
    ports:
      - "9001:1080"
    environment:
      - WARP_SLEEP=2
      - WARP_LICENSE_KEY=
    cap_add:
      - NET_ADMIN
    volumes:
      - warp-data-1:/var/lib/cloudflare-warp

  warp-node-2:
