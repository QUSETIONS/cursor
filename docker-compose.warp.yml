version: '3.8'

services:
  warp-9001:
    image: cmj2002/warp
    restart: always
    privileged: true
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    ports:
      - "9001:1080"
      
